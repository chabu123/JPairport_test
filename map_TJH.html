<!DOCTYPE html>
<html lang="ja">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>但馬空港 コンシェルジュマップ</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="style.css" />
    <script src="map_data_TJH.js"></script>
    
</head>
<body>

    <div id="map"></div>

    <script>
        const TJH_LAT = 35.51674, TJH_LNG = 134.78894;
        const TJH_URL = "https://www.tajima-airport.jp/";
        
        var map = L.map('map').setView([TJH_LAT, TJH_LNG], 9);
        L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/pale/{z}/{x}/{y}.png', { attribution: "地理院タイル" }).addTo(map);

        var airportIcon = L.divIcon({
            className: 'custom-div-icon',
            html: `<div class="airport-pin"><svg viewBox="0 0 30 42" class="airport-pin-svg"><path d="M15 0C6.7 0 0 6.7 0 15c0 10.5 15 27 15 27s15-16.5 15-27c0-8.3-6.7-15-15-15z"/></svg><div class="airport-icon-inner">✈️</div></div>`,
            iconSize: [28, 38], iconAnchor: [14, 38]
        });

        var iKanko = `https://www.google.com/maps/search/観光/@${TJH_LAT},${TJH_LNG},15z`;
        var iOmiya = `https://www.google.com/maps/search/お土産/@${TJH_LAT},${TJH_LNG},15z`;
        var iGourmet = `https://www.google.com/maps/search/食事/@${TJH_LAT},${TJH_LNG},15z`;

        L.marker([TJH_LAT, TJH_LNG], {icon: airportIcon})
            .addTo(map)
            .bindPopup(`
                <div class="popup-card">
                    <a href="${TJH_URL}" target="_blank" class="popup-title popup-title-airport">但馬空港 公式サイト 🔗</a>
                    <div class="search-label">📍 空港周辺を検索：</div>
                    <div class="search-group">
                        <a href="${iKanko}" target="_blank" class="btn btn-orange btn-sm">📷 観光</a>
                        <a href="${iOmiya}" target="_blank" class="btn btn-orange btn-sm">🎁 お土産</a>
                        <a href="${iGourmet}" target="_blank" class="btn btn-orange btn-sm">🍴 食事</a>
                    </div>
                </div>
            `);

        var spotLayer = L.layerGroup(); 

        if (typeof airport_data !== 'undefined') {
            airport_data.associations.forEach(function(assoc) {
                const kid = assoc.K_ID;
                const sSearch = assoc.Search_name || assoc.K_name;
                
                var pinIcon = L.divIcon({
                    className: 'custom-div-icon',
                    html: `<div class="assoc-pin"><svg viewBox="0 0 30 42" class="${(assoc.spot_count > 0) ? "pin-svg-blue" : "pin-svg-gray"}"><path d="M15 0C6.7 0 0 6.7 0 15c0 10.5 15 27 15 27s15-16.5 15-27c0-8.3-6.7-15-15-15z"/></svg><div class="pin-number">${assoc.spot_count}</div></div>`,
                    iconSize: [28, 38], iconAnchor: [14, 38]
                });

                var weatherUrl = `https://www.google.com/search?q=${encodeURIComponent(sSearch)}+天気`;
                var japan47Url = `https://www.japan47go.travel/ja/search/result?place=${encodeURIComponent(sSearch)}`;
                
                var routeToUrl = `https://www.google.com/maps/dir/?api=1&origin=${TJH_LAT},${TJH_LNG}&destination=${assoc.Latitude},${assoc.Longitude}`;
                var routeEditUrl = `https://www.google.com/maps/dir/?api=1&destination=${assoc.Latitude},${assoc.Longitude}`;
                
                var sKanko = `https://www.google.com/maps/search/観光/@${assoc.Latitude},${assoc.Longitude},15z`;
                var sOmiya = `https://www.google.com/maps/search/お土産/@${assoc.Latitude},${assoc.Longitude},15z`;
                var sGourmet = `https://www.google.com/maps/search/食事/@${assoc.Latitude},${assoc.Longitude},15z`;

                L.marker([assoc.Latitude, assoc.Longitude], {icon: pinIcon})
                    .addTo(map)
                    .bindTooltip(assoc.K_name, { className: 'custom-tooltip', direction: 'top', offset: [0, -35] })
                    .bindPopup(`
                        <div class="popup-card">
                            <a id="${kid}" href="${assoc.URL}" target="_blank" class="popup-title popup-title-assoc">${assoc.K_name} 🔗</a>
                            <a id="W${kid}" href="${weatherUrl}" target="_blank" class="info-row" style="color:#ed9121;"><span class="info-icon">🌦</span> <b>グラフで見る天気予報 📊</b></a>
                            <a id="L${kid}" href="${japan47Url}" target="_blank" class="info-row" style="color:#007bff;"><span class="info-icon">🔍</span> 観光情報 (Japan47GO)</a>
                            <a id="GA${kid}" href="${routeToUrl}" target="_blank" class="btn btn-red">🏎 但馬空港から行く</a>
                            <a id="GP${kid}" href="${routeEditUrl}" target="_blank" class="btn btn-blue">🗺 出発地を変更して計画</a>
                            <div class="search-label">📍 周辺を検索：</div>
                            <div class="search-group">
                                <a id="GSK${kid}" href="${sKanko}" target="_blank" class="btn btn-orange btn-sm">📷 観光</a>
                                <a id="GSO${kid}" href="${sOmiya}" target="_blank" class="btn btn-orange btn-sm">🎁 お土産</a>
                                <a id="GSG${kid}" href="${sGourmet}" target="_blank" class="btn btn-orange btn-sm">🍴 食事</a>
                            </div>
                        </div>
                    `);
            });

            airport_data.spots.forEach(function(spot) {
                const sid = spot.Spot_ID;
                const dispName = spot.Spot_name || spot.Name || "観光スポット";
                
                var spotIcon = L.divIcon({
                    className: 'custom-div-icon',
                    html: `<div class="spot-pin-wrap"><svg viewBox="0 0 30 42" class="spot-pin-svg"><path d="M15 0C6.7 0 0 6.7 0 15c0 10.5 15 27 15 27s15-16.5 15-27c0-8.3-6.7-15-15-15z"/></svg><div class="spot-icon-inner">📸</div></div>`,
                    iconSize: [24, 32], iconAnchor: [12, 32]
                });

                var weatherUrl = `https://www.google.com/search?q=${encodeURIComponent(dispName)}+天気`;
                var routeToUrl = `https://www.google.com/maps/dir/?api=1&origin=${TJH_LAT},${TJH_LNG}&destination=${spot.Latitude},${spot.Longitude}`;
                var routeEditUrl = `https://www.google.com/maps/dir/?api=1&destination=${spot.Latitude},${spot.Longitude}`;
                
                var sKanko = `https://www.google.com/maps/search/観光/@${spot.Latitude},${spot.Longitude},15z`;
                var sOmiya = `https://www.google.com/maps/search/お土産/@${spot.Latitude},${spot.Longitude},15z`;
                var sGourmet = `https://www.google.com/maps/search/食事/@${spot.Latitude},${spot.Longitude},15z`;
                
                L.marker([spot.Latitude, spot.Longitude], { icon: spotIcon })
                    .bindTooltip(dispName, { className: 'custom-tooltip', direction: 'top', offset: [0, -25] })
                    .bindPopup(`
                        <div class="popup-card">
                            <a id="${sid}" href="${spot.URL}" target="_blank" class="popup-title popup-title-spot">${dispName} 🔗</a>
                            <a id="W${sid}" href="${weatherUrl}" target="_blank" class="info-row" style="color:#ed9121;"><span class="info-icon">🌦</span> <b>グラフで見る天気予報 📊</b></a>
                            <a id="GA${sid}" href="${routeToUrl}" target="_blank" class="btn btn-red">🏎 但馬空港から行く</a>
                            <a id="GP${sid}" href="${routeEditUrl}" target="_blank" class="btn btn-blue">🗺 出発地を変更して計画</a>
                            <div class="search-label">📍 周辺を検索：</div>
                            <div class="search-group">
                                <a id="GSK${sid}" href="${sKanko}" target="_blank" class="btn btn-orange btn-sm">📷 観光</a>
                                <a id="GSO${sid}" href="${sOmiya}" target="_blank" class="btn btn-orange btn-sm">🎁 お土産</a>
                                <a id="GSD${sid}" href="${sGourmet}" target="_blank" class="btn btn-orange btn-sm">🍴 食事</a>
                            </div>
                        </div>
                    `).addTo(spotLayer);
            });
        }

        function updateLayers() {
            if (map.getZoom() >= 11) { if (!map.hasLayer(spotLayer)) map.addLayer(spotLayer); }
            else { if (map.hasLayer(spotLayer)) map.removeLayer(spotLayer); }
        }
        map.on('zoomend', updateLayers);
        updateLayers();
    </script>
</body>
</html>
